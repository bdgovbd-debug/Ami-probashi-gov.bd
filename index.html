  <body>
    <div id="root">
      <!-- Fast React Static Loader -->
      <style>
        .initial-loader-wrapper {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          position: fixed;
          left: 0;
          top: 0;
          right: 0;
          bottom: 0;
          background-color: #f1f5f9;
          font-family: "Hind Siliguri", "Inter", system-ui, -apple-system, sans-serif;
          z-index: 99999;
          padding: 24px;
          text-align: center;
        }
        .initial-loader-logo {
          width: 72px;
          height: 72px;
          border-radius: 50%;
          background: radial-gradient(circle, #10b981 0%, #064e3b 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 10px 30px rgba(16, 185, 129, 0.25);
          margin-bottom: 24px;
          animation: logo-pulse 2s infinite ease-in-out;
          border: 2px solid #eab308;
          position: relative;
        }
        .initial-loader-logo::after {
          content: '★';
          color: #fbbf24;
          font-size: 26px;
        }
        .initial-loader-spinner {
          width: 36px;
          height: 36px;
          border: 3.5px solid #cbd5e1;
          border-top-color: #10b981;
          border-right-color: #10b981;
          border-radius: 50%;
          animation: spin 0.85s linear infinite;
          margin-bottom: 24px;
        }
        .initial-loader-title {
          font-size: 16px;
          font-weight: 800;
          color: #0f172a;
          margin: 0 0 6px 0;
          letter-spacing: -0.01em;
        }
        .initial-loader-subtitle {
          font-size: 11px;
          font-weight: 600;
          color: #64748b;
          margin: 0;
          letter-spacing: 0.02em;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        @keyframes logo-pulse {
          0%, 100% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.06); opacity: 0.95; }
        }
      </style>
      <div class="initial-loader-wrapper">
        <div class="initial-loader-logo"></div>
        <div class="initial-loader-spinner"></div>
        <h2 class="initial-loader-title">প্রবাসী কল্যাণ ও বৈদেশিক কর্মসংস্থান মন্ত্রণালয়</h2>
        <p class="initial-loader-subtitle">স্মার্ট সার্ভিস ও ডিজিটাল অর্ডার পোর্টাল লোড হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
